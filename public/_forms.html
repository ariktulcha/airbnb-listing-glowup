<!doctype html>
<html lang="en">
  <head><meta charset="utf-8"><title>Netlify form detection</title></head>
  <body>
    <form name="listing-score" method="POST" action="/thank-you/" data-netlify="true" netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="listing-score" />
      <input name="bot-field" />
      <input name="airbnb-url" type="url" />
      <input name="contact" type="text" />
      <input name="city" type="text" />
      <select name="properties"><option>1</option><option>2–5</option><option>6–20</option><option>20+</option></select>
      <select name="priority"><option>Not sure — diagnose it</option><option>Photos / cover image</option><option>Copy and captions</option><option>Bookings / conversion</option><option>Pricing and positioning</option></select>
      <textarea name="notes"></textarea>
    </form>
  </body>
</html>
